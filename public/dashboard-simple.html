<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau du Personnel - KFC France</title>
    <link rel="icon" href="https://www.clipartmax.com/png/small/47-474635_kfc-trinidad-tobago-kfc-logo-2017.png" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #fff5f3 0%, #fdece8 100%);
            color: #1c1c1c;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            background: #D52B1E;
            border: 2px solid #B2221A;
            border-radius: 24px;
            padding: 28px 32px;
            margin-bottom: 24px;
            box-shadow: 0 18px 50px rgba(213, 43, 30, 0.22);
        }

        .header h1 {
            font-size: 2.1rem;
            color: #ffffff;
            letter-spacing: 0.1em;
            margin: 0;
            text-transform: uppercase;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .header-logo-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            border-radius: 18px;
            background: #ffffff;
            padding: 6px;
            border: 1px solid rgba(255, 255, 255, 0.32);
        }

        .header p {
            color: #ffffff;
            font-size: 1rem;
            margin-top: 8px;
            max-width: 620px;
            line-height: 1.5;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #D52B1E;
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            text-decoration: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(213, 43, 30, 0.3);
            background: #B2221A;
        }

        .btn.secondary {
            background: #ffffff;
            border: 2px solid #D52B1E;
            color: #D52B1E;
        }

        .btn.secondary:hover {
            background: #D52B1E;
            color: #ffffff;
        }

        .section {
            background: #ffffff;
            border: 2px solid #D52B1E;
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(213, 43, 30, 0.15);
        }

        .section h2 {
            margin-bottom: 18px;
            font-size: 1.6rem;
            color: #D52B1E;
        }

        .guest-list {
            display: grid;
            gap: 20px;
        }

        .guest-card {
            background: #f9f9f9;
            border: 2px solid #D52B1E;
            border-radius: 14px;
            padding: 22px;
            box-shadow: 0 6px 24px rgba(213, 43, 30, 0.1);
        }

        .guest-card h3 {
            margin-bottom: 12px;
            color: #D52B1E;
        }

        .guest-card p {
            margin-bottom: 10px;
            color: #333333;
            line-height: 1.5;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .status-pending {
            background: rgba(255, 193, 110, 0.2);
            color: #D52B1E;
        }

        .status-approved {
            background: rgba(39, 174, 96, 0.2);
            color: #27ae60;
        }

        .approve-btn {
            margin-top: 12px;
            background: #D52B1E;
            color: #ffffff;
            border: none;
            border-radius: 25px;
            padding: 12px 18px;
            cursor: pointer;
            font-weight: 600;
        }

        .approve-btn:hover {
            background: #B2221A;
        }

        .debug-panel {
            background: #f5f5f5;
            border: 2px solid #D52B1E;
            border-radius: 14px;
            padding: 20px;
            color: #333333;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.6;
        }

        .debug-panel h4 {
            margin-bottom: 14px;
            color: #D52B1E;
        }

        .debug-message {
            margin-bottom: 8px;
        }

        @media (max-width: 900px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            main {
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-logo">
                <img class="header-logo-img" src="https://www.clipartmax.com/png/small/231-2311164_kentucky-fried-chicken-logo-kfc-logo-transparent-png.png" alt="KFC France Logo" />
                <div>
                    <h1>Tableau du Personnel KFC</h1>
                    <p>Gérez les clients et commandes avec un tableau clair, moderne et simple à utiliser.</p>
                </div>
            </div>
            <div class="controls">
                <a class="btn secondary" href="/database.html">Ouvrir Visionneuse Base de Données</a>
            </div>
        </div>

        <section class="section">
            <h2>Clients en Attente</h2>
            <div id="guests-list" class="guest-list"></div>
        </section>

 
    </div>

    <script>
        function updateDebug(message) {
            const debugDiv = document.getElementById('debug-content');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'debug-message';
            entry.textContent = `[${timestamp}] ${message}`;
            //debugDiv.prepend(entry);
            console.log(`[${timestamp}] ${message}`);
        }

        async function loadPendingGuests() {
            updateDebug('Chargement des clients en attente...');

            try {
                const response = await fetch('/api/guest-sessions');
                const result = await response.json();

                updateDebug(`Réponse API : ${JSON.stringify(result)}`);

                const guestsList = document.getElementById('guests-list');
                guestsList.innerHTML = '';

                if (result.success && result.sessions.length > 0) {
                    result.sessions.forEach(session => {
                        const guestCard = document.createElement('div');
                        guestCard.className = 'guest-card';

                        const statusClass = session.status === 'approved' ? 'status-approved' : 'status-pending';
                        const statusLabel = session.status === 'approved' ? 'Approuvé' : 'En Attente';

                        guestCard.innerHTML = `
                            <h3>${session.name} — Table ${session.room}</h3>
                            <p><span class="status-badge ${statusClass}">${statusLabel}</span></p>
                            <p><strong>Numéro de Téléphone:</strong> ${session.checkout || 'N/A'}</p>
                            <p><strong>ID Session:</strong> ${session.id}</p>
                            <p><strong>Statut:</strong> ${session.status}</p>
                            <button type="button" class="approve-btn" onclick="approveGuest('${session.id}')">Valider</button>
                        `;
                        guestsList.appendChild(guestCard);
                    });

                    updateDebug(`Affiché ${result.sessions.length} clients en attente`);
                } else {
                    guestsList.innerHTML = '<div class="guest-card"><p>Aucun client en attente trouvé.</p></div>';
                    updateDebug('Aucun client en attente trouvé');
                }
            } catch (error) {
                updateDebug(`Erreur lors du chargement des clients : ${error.message}`);
            }
        }

        const API_BASE = window.location.origin;

        async function approveGuest(sessionId) {
                updateDebug(`Approbation du client : ${sessionId}`);

            try {
                const response = await fetch(`${API_BASE}/api/guest-sessions/${sessionId}/approve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const result = await response.json();
                updateDebug(`Réponse d'approbation: ${JSON.stringify(result)}`);

                if (result.success) {
                    updateDebug(`Client ${result.session.name} validé avec succès !`);
                    loadPendingGuests();
                } else {
                    updateDebug(` Échec de validation : ${result.error}`);
                }
            } catch (error) {
                updateDebug(`Erreur lors de la validation du client : ${error.message}`);
            }
        }

        window.onload = function() {
            updateDebug('Tableau chargé');
            loadPendingGuests();
            setInterval(loadPendingGuests, 10000);
        };
    </script>
</body>
</html>
