<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIGITAL4BUSINESS Tab</title>
  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/microsoft.teams.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #25346f;
    }

    .tab-container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
    }

    .tab-loading {
      text-align: center;
      padding: 20px;
    }

    .tab-loading h2 {
      color: #25346f;
      margin-bottom: 10px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      margin: 0;
      padding: 0;
    }

    .error {
      padding: 20px;
      background: #fff4e6;
      color: #d32f2f;
      border: 1px solid #ffb74d;
      border-radius: 8px;
      margin: 20px;
    }
  </style>
</head>
<body>
  <div class="tab-container" id="tab-container">
    <div class="tab-loading">
      <h2>Loading DIGITAL4BUSINESS Chat...</h2>
      <p>Initializing Teams integration...</p>
    </div>
  </div>

  <script>
    // Initialize Teams SDK
    microsoftTeams.initialize();

    // Get Teams context
    microsoftTeams.app.getContext().then((context) => {
      console.log('Teams context:', context);

      // Set up Teams context (userId, tenantId, etc.)
      const userId = context.user?.id;
      const userDisplayName = context.user?.displayName;
      const tenantId = context.user?.tenant?.id;

      // Construct chat URL with Teams user info as parameters
      const chatUrl = `/public/chat.html?teamsUserId=${encodeURIComponent(userId || '')}&userName=${encodeURIComponent(userDisplayName || 'Teams User')}&tenantId=${encodeURIComponent(tenantId || '')}`;

      // Embed chat.html in an iframe or replace container
      const container = document.getElementById('tab-container');
      container.innerHTML = `<iframe src="${chatUrl}" title="DIGITAL4BUSINESS Chat"></iframe>`;

      // Notify Teams that the app is ready
      microsoftTeams.app.notifySuccess();
    }).catch((error) => {
      console.error('Failed to get Teams context:', error);
      const container = document.getElementById('tab-container');
      container.innerHTML = `<div class="error">
        <h3>Failed to Initialize</h3>
        <p>${error.message}</p>
      </div>`;
    });
  </script>
</body>
</html>
