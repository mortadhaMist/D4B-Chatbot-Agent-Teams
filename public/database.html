<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.clipartmax.com/png/small/47-474635_kfc-trinidad-tobago-kfc-logo-2017.png"  />
    <title>Visionneuse Base de Données - KFC France</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #fff5f3 0%, #f8ece8 100%);
            min-height: 100vh;
            color: #1f1f1f;
            padding: 24px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            background: #D52B1E;
            border-radius: 24px;
            padding: 30px 36px;
            margin-bottom: 30px;
            border: 1px solid rgba(213, 43, 30, 0.3);
            box-shadow: 0 24px 70px rgba(213, 43, 30, 0.16);
        }

        .header-logo-img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            border-radius: 18px;
            background: #ffffff;
            padding: 6px;
            border: 1px solid rgba(255, 255, 255, 0.28);
        }

        .header h1 {
            color: #ffffff;
            font-size: 2.9rem;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .header p {
            text-align: center;
            color: rgba(255, 255, 255, 0.92);
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #ffffff;
            border-radius: 22px;
            padding: 28px;
            border: 2px solid rgba(213, 43, 30, 0.2);
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 42px rgba(213, 43, 30, 0.14);
        }

        .stat-number {
            font-size: 2.8rem;
            font-weight: 800;
            color: #D52B1E;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #6b6b6b;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            background: #D52B1E;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 28px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 800;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background: #b71d14;
            transform: translateY(-1px);
            box-shadow: 0 12px 28px rgba(213, 43, 30, 0.2);
        }

        .btn.secondary {
            background: #ffffff;
            color: #D52B1E;
            border: 2px solid #D52B1E;
        }

        .btn.secondary:hover {
            background: #D52B1E;
            color: white;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .nav-link,
        .nav-link:link,
        .nav-link:visited,
        .nav-link:active {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            border-radius: 999px;
            background: #D52B1E;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            transition: background 0.2s, transform 0.2s;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            background: #b71d14;
            transform: translateY(-1px);
            text-decoration: none;
        }

        .nav-link:focus {
            outline: 2px solid rgba(213, 43, 30, 0.4);
            outline-offset: 2px;
        }

        .table-section {
            background: #ffffff;
            border-radius: 22px;
            margin-bottom: 30px;
            border: 1px solid rgba(213, 43, 30, 0.18);
            overflow: hidden;
            box-shadow: 0 24px 60px rgba(213, 43, 30, 0.1);
        }

        .table-header {
            background: #fbe9e7;
            padding: 22px 28px;
            border-bottom: 1px solid rgba(213, 43, 30, 0.12);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .table-header h2 {
            color: #D52B1E;
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0;
        }

        .table-container {
            overflow-x: auto;
            max-height: 680px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #fff5f3;
            color: #1f1f1f;
            padding: 16px 20px;
            text-align: left;
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid rgba(213, 43, 30, 0.2);
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(213, 43, 30, 0.12);
            vertical-align: top;
            color: #383838;
        }

        tr:hover {
            background: rgba(213, 43, 30, 0.05);
        }

        .status-pending,
        .status-open {
            background: #fff1e8;
            color: #b33326;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-completed,
        .status-done {
            background: #d4f8e8;
            color: #1f6f4d;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-cancelled {
            background: #f9d6d6;
            color: #8d1a1a;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .text-truncate {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .timestamp {
            color: #7b7b7b;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #94160d;
        }

        @media (max-width: 900px) {
            .header {
                padding: 26px 22px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .table-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        .loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid #3a3a3a;
            border-top: 2px solid #4a9eff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888888;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #cccccc;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .btn {
                justify-content: center;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            th, td {
                padding: 8px 12px;
                font-size: 12px;
            }

            .text-truncate {
                max-width: 150px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.25/dist/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <img class="header-logo-img" src="https://www.clipartmax.com/png/middle/231-2311164_kentucky-fried-chicken-logo-kfc-logo-transparent-png.png" alt="KFC France Logo" />
            <div>
                <h1>Visionneuse de Données KFC</h1>
                <p>Vue en temps réel des données clients et commandes KFC</p>
            </div>
        </div>

        <div id="stats-container" class="stats-grid">
            <!-- Stats will be loaded here -->
        </div>

        <div class="controls">
            <button class="btn secondary" onclick="exportExcel()">
                Exporter Excel
            </button>
            <button class="btn secondary" onclick="exportPDF()">
                Exporter PDF
            </button>
            <a href="/chat.html" class="nav-link">Interface de Chat</a>
            <a href="/log.html" class="nav-link">Journaux des Demandes</a>
            <a href="/dashboard-simple.html" class="nav-link">Tableau de Bord</a>
        </div>

        <!-- Clients Table -->
        <div class="table-section">
            <div class="table-header">
                <h2>Clients</h2>
            </div>
            <div class="table-container" id="guests-table">
                <div class="loading">Chargement des clients...</div>
            </div>
        </div>

        <!-- Requests Table -->
        <div class="table-section">
            <div class="table-header">
                <h2>Demandes de Service</h2>
            </div>
            <div class="table-container" id="requests-table">
                <div class="loading">Chargement des demandes...</div>
            </div>
        </div>

        <!-- Conversations Table -->
        <div class="table-section">
            <div class="table-header">
                <h2>Conversations</h2>
            </div>
            <div class="table-container" id="conversations-table">
                <div class="loading">Chargement des conversations...</div>
            </div>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;
        let isAutoRefresh = false;

        // Load all data on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadAllData();
            startAutoRefresh();
        });

        function startAutoRefresh() {
            if (isAutoRefresh) return;
            autoRefreshInterval = setInterval(loadAllData, 10000);
            isAutoRefresh = true;
            document.getElementById('auto-refresh-text').textContent = "Désactiver l'actualisation automatique";
        }

        async function loadAllData() {
            console.log('Loading all database data...');

            // Run each loader and tolerate failures so a single failing endpoint
            // doesn't prevent the rest of the UI from updating.
            const tasks = [
                loadStats().catch(err => { console.error('loadStats failed', err); }),
                loadGuests().catch(err => { console.error('loadGuests failed', err); }),
                loadRequests().catch(err => { console.error('loadRequests failed', err); }),
                loadConversations().catch(err => { console.error('loadConversations failed', err); })
            ];

            const results = await Promise.allSettled(tasks);
            const failed = results.filter(r => r.status === 'rejected');
            if (failed.length) console.warn(`${failed.length} data loaders failed`);
            console.log('All data load attempts completed');
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/db/stats');
                const data = await response.json();
                
                if (data.success) {
                    displayStats(data.stats);
                } else {
                    console.error('Failed to load stats:', data.error);
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        function displayStats(stats) {
            const container = document.getElementById('stats-container');
            container.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${stats.guests || 0}</div>
                    <div class="stat-label">Total des Clients</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.requests || 0}</div>
                    <div class="stat-label">Total des Demandes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.pending_requests || 0}</div>
                    <div class="stat-label">Demandes en Attente</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.conversations || 0}</div>
                    <div class="stat-label">Conversations</div>
                </div>
            `;
        }

        async function loadGuests() {
            try {
                const response = await fetch('/api/db/guests', { cache: 'no-store' });
                console.log('loadGuests response status:', response.status);
                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    console.error('loadGuests: failed to parse JSON', e, 'responseText:', text);
                    data = { success: false };
                }
                
                if (data.success) {
                    displayGuests(data.guests);
                } else {
                    document.getElementById('guests-table').innerHTML = '<div class="empty-state"><h3>Échec du chargement des clients</h3></div>';
                }
            } catch (error) {
                console.error('Erreur de chargement des clients :', error);
                document.getElementById('guests-table').innerHTML = '<div class="empty-state"><h3>Erreur de chargement des clients</h3><pre style="color:#b33">'+String(error)+'</pre></div>';
            }
        }

        function displayGuests(guests) {
            const container = document.getElementById('guests-table');
            
            if (!guests || guests.length === 0) {
                    container.innerHTML = '<div class="empty-state"><h3>Aucun client trouvé</h3><p>Aucun enregistrement de client dans la base de données</p></div>';
                    return;
            }

            const table = `
                <table>
                    <thead>
                        <tr>
                            
                            <th>Client</th>
                            <th>Table</th>
                            <th>Language</th>
                            <th>Date de création</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${guests.map(guest => `
                            <tr>
                                
                                <td><strong>${guest.name}</strong></td>
                                <td>${guest.room_number}</td>
                                <td>${guest.language}</td>
                                <td class="timestamp">${formatTimestamp(guest.created_at)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            container.innerHTML = table;
        }

        async function loadRequests() {
            try {
                const response = await fetch('/api/db/requests', { cache: 'no-store' });
                console.log('loadRequests response status:', response.status);
                const text = await response.text();
                let data;
                try { data = JSON.parse(text); } catch (e) { console.error('loadRequests JSON parse error', e, text); data = { success: false }; }

                if (data.success) {
                    displayRequests(data.requests);
                } else {
                    document.getElementById('requests-table').innerHTML = '<div class="empty-state"><h3>Échec du chargement des demandes</h3></div>';
                }
            } catch (error) {
                console.error('Erreur de chargement des demandes :', error);
                document.getElementById('requests-table').innerHTML = '<div class="empty-state"><h3>Erreur de chargement des demandes</h3><pre style="color:#b33">'+String(error)+'</pre></div>';
            }
        }

        function displayRequests(requests) {
            const container = document.getElementById('requests-table');
            
            if (!requests || requests.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>Aucune demande trouvée</h3><p>Aucune demande de service dans la base de données</p></div>';
                return;
            }

            const table = `
                <table>
                    <thead>
                        <tr>
                            
                            <th>Client</th>
                            <th>Table</th>
                            <th>Type</th>
                            <th>Statut</th>
                            <th>Commande</th>
                            <th>Date de création</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${requests.map(request => {
                            const statusClass = `status-${String(request.status || 'pending').toLowerCase()}`;
                            return `
                            <tr>
                                
                                <td>${request.guest_name || 'Inconnu'}</td>
                                <td>${request.room_number || 'N/A'}</td>
                                <td><strong>${request.type}</strong></td>
                                <td><span class="${statusClass}">${translateStatus(request.status)}</span></td>
                                <td class="text-truncate" title="${request.notes || ''}">${request.notes || 'Aucune note'}</td>
                                <td class="timestamp">${formatTimestamp(request.created_at)}</td>
                            </tr>
                        `;
                        }).join('')}
                    </tbody>
                </table>
            `;
            
            container.innerHTML = table;
        }

        async function loadConversations() {
            try {
                const response = await fetch('/api/db/conversations', { cache: 'no-store' });
                console.log('loadConversations response status:', response.status);
                const text = await response.text();
                let data;
                try { data = JSON.parse(text); } catch (e) { console.error('loadConversations JSON parse error', e, text); data = { success: false }; }

                if (data.success) {
                    displayConversations(data.conversations);
                } else {
                    document.getElementById('conversations-table').innerHTML = '<div class="empty-state"><h3>Échec du chargement des conversations</h3></div>';
                }
            } catch (error) {
                console.error('Erreur de chargement des conversations :', error);
                document.getElementById('conversations-table').innerHTML = '<div class="empty-state"><h3>Erreur de chargement des conversations</h3><pre style="color:#b33">'+String(error)+'</pre></div>';
            }
        }

        function displayConversations(conversations) {
            const container = document.getElementById('conversations-table');
            
            if (!conversations || conversations.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>Aucune conversation trouvée</h3><p>Aucun enregistrement de conversation dans la base de données</p></div>';
                return;
            }

            const table = `
                <table>
                    <thead>
                        <tr>
                            
                            <th>Client</th>
                            <th>Table</th>
                            <th>Message</th>
                            <th>Response</th>
                            <th>Date de création</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${conversations.map(conv => `
                            <tr>
                                
                                <td>${conv.guest_name || 'Inconnu'}</td>
                                <td>${conv.room_number || 'N/A'}</td>
                                <td class="text-truncate" title="${conv.message}">${conv.message}</td>
                                <td class="text-truncate" title="${conv.response}">${conv.response}</td>
                                <td class="timestamp">${formatTimestamp(conv.timestamp)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            container.innerHTML = table;
        }

        function formatTimestamp(timestamp) {
            if (!timestamp) return 'N/A';
            const date = new Date(timestamp);
            return date.toLocaleString();
        }

        function translateStatus(status) {
            if (!status) return 'En attente';
            const normalized = String(status).toUpperCase();
            if (['OPEN', 'PENDING', 'EN COURS'].includes(normalized)) return 'En cours';
            if (['DONE', 'CLOSED', 'COMPLETED', 'TERMINE'].includes(normalized)) return 'Terminé';
            if (['CANCELLED', 'CANCELED', 'ANNULÉ', 'ANNULÉE'].includes(normalized)) return 'Annulé';
            if (['APPROVED', 'ACCEPTED', 'VALIDÉ', 'VALIDÉE'].includes(normalized)) return 'Approuvé';
            return status;
        }

        function toggleAutoRefresh() {
            const button = document.getElementById('auto-refresh-text');

            if (isAutoRefresh) {
                clearInterval(autoRefreshInterval);
                isAutoRefresh = false;
                button.textContent = "Activer l'actualisation automatique";
            } else {
                autoRefreshInterval = setInterval(loadAllData, 30000); // Refresh every 30 seconds
                isAutoRefresh = true;
                button.textContent = "Désactiver l'actualisation automatique";
            }
        }

        async function fetchExportData() {
            const [statsRes, guestsRes, requestsRes, conversationsRes] = await Promise.all([
                fetch('/api/db/stats'),
                fetch('/api/db/guests'),
                fetch('/api/db/requests'),
                fetch('/api/db/conversations')
            ]);

            const [statsData, guestsData, requestsData, conversationsData] = await Promise.all([
                statsRes.json(),
                guestsRes.json(),
                requestsRes.json(),
                conversationsRes.json()
            ]);

            return {
                stats: statsData.stats || {},
                guests: guestsData.guests || [],
                requests: requestsData.requests || [],
                conversations: conversationsData.conversations || []
            };
        }

        async function exportExcel() {
            try {
                const data = await fetchExportData();
                exportToExcel(data);
            } catch (error) {
                console.error('Export Excel failed:', error);
                alert('Excel export failed. Check the console for details.');
            }
        }

        async function exportPDF() {
            try {
                const data = await fetchExportData();
                await exportToPDF(data);
            } catch (error) {
                console.error('Export PDF failed:', error);
                alert('PDF export failed. Check the console for details.');
            }
        }

        function exportToExcel({ stats, guests, requests, conversations }) {
            const wb = XLSX.utils.book_new();

            const summaryRows = [
                { Metric: 'Total des clients', Value: stats.guests || 0 },
                { Metric: 'Total des demandes', Value: stats.requests || 0 },
                { Metric: 'Demandes en attente', Value: stats.pending_requests || 0 },
                { Metric: 'Conversations', Value: stats.conversations || 0 }
            ];
            const summarySheet = XLSX.utils.json_to_sheet(summaryRows);
            XLSX.utils.book_append_sheet(wb, summarySheet, 'Summary');

            const guestRows = guests.map(g => ({
                    Client: g.name || 'Unknown',
                    'Table Number': g.room_number || 'N/A',
                    Language: g.language || 'N/A',
                    'Created At': g.created_at ? new Date(g.created_at).toLocaleString() : 'N/A'
                }));
                const guestSheet = XLSX.utils.json_to_sheet(guestRows);
                XLSX.utils.book_append_sheet(wb, guestSheet, 'Clients');
            const requestRows = requests.map(r => ({
                Client: r.guest_name || 'Unknown',
                Table: r.room_number || 'N/A',
                Text: r.text || '',
                Category: r.category || '',
                Status: r.status || '',
                'Created At': r.created_at ? new Date(r.created_at).toLocaleString() : 'N/A'
            }));
            const requestSheet = XLSX.utils.json_to_sheet(requestRows);
XLSX.utils.book_append_sheet(wb, requestSheet, 'Demandes');

            const filename = `kfc_france_db_export_${new Date().toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(wb, filename);
        }

 async function exportToPDF({ stats, guests, requests, conversations }) {

    // 2. Fetch and convert the local image to Base64
    const logoData = await getBase64ImageFromURL(logoUrl).catch((err) => {
        console.error("Local logo failed to load. Ensure you are using a local server.", err);
        return null;
    });

    const doc = window.jspdf.jsPDF({ unit: 'pt', format: 'a4' });
    const pageWidth = doc.internal.pageSize.getWidth();
    const margin = 40;
    let cursorY = 50;

    // 3. Add the local logo to the PDF
    if (logoData) {
        const imageWidth = 80;
        const imageHeight = 80;
        doc.addImage(logoData, 'PNG', margin, cursorY, imageWidth, imageHeight);
    }

    doc.setFontSize(22);
    doc.setTextColor(213, 43, 30);
    doc.text('KFC France', pageWidth / 2, cursorY + 45, { align: 'center' });
    cursorY += 100;

    doc.setFontSize(12);
    doc.setTextColor(60, 60, 60);
    doc.text(`Export Date: ${new Date().toLocaleString()}`, margin, cursorY);
    cursorY += 20;
    doc.text('Summary:', margin, cursorY);
    cursorY += 18;

    const summaryText = [
        `Total Clients: ${stats.guests || 0}`,
        `Total Requests: ${stats.requests || 0}`,
        `Pending Requests: ${stats.pending_requests || 0}`,
        `Conversations: ${stats.conversations || 0}`
    ];
    summaryText.forEach(line => {
        doc.text(line, margin + 10, cursorY);
        cursorY += 16;
    });
    cursorY += 10;

    const tableOptions = {
        startY: cursorY,
        margin: { left: margin, right: margin },
        styles: { fontSize: 9, cellPadding: 4, valign: 'middle' },
        headStyles: { fillColor: [213, 43, 30], textColor: 255, halign: 'center' },
        alternateRowStyles: { fillColor: [249, 245, 245] },
        theme: 'grid'
    };

    if (guests.length) {
        doc.text('Clients', margin, cursorY);
        cursorY += 12;
        doc.autoTable({
            ...tableOptions,
            startY: cursorY,
            head: [['Client', 'Table', 'Language', 'Créer le']],
            body: guests.map(g => [
                g.name || 'Unknown',
                g.room_number || 'N/A',
                g.language || 'N/A',
                g.created_at ? new Date(g.created_at).toLocaleString() : 'N/A'
            ])
        });
        cursorY = doc.lastAutoTable.finalY + 20;
    }

    if (requests.length) {
        doc.text('Requests', margin, cursorY);
        cursorY += 12;
        doc.autoTable({
            ...tableOptions,
            startY: cursorY,
            head: [['Client', 'Table', 'Text', 'Category', 'Status', 'Created At']],
            body: requests.map(r => [
                r.guest_name || 'Unknown',
                r.room_number || 'N/A',
                r.text || '',
                r.category || '',
                r.status || '',
                r.created_at ? new Date(r.created_at).toLocaleString() : 'N/A'
            ])
        });
        cursorY = doc.lastAutoTable.finalY + 20;
    }

    const pdfFilename = `kfc_france_db_export_${new Date().toISOString().split('T')[0]}.pdf`;
    doc.save(pdfFilename);
}

    async function getBase64ImageFromURL(url) {
    // Standard fetch is sufficient for local relative paths
    const response = await fetch(url);
    if (!response.ok) throw new Error(`Could not find image file: ${url}`);
    
    const blob = await response.blob();
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
    });
}
